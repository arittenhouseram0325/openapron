<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - OpenApron</title>

    <style>
      body {
        font-family: Arial;
        margin: 0;
        background-color: #f4f4f4;
        text-align: center;
      }

      header {
        background-color: #4caf50;
        color: white;
        padding: 20px;
      }

      nav {
        background-color: #ffffff;
        padding: 10px;
      }

      nav a {
        margin: 15px;
        text-decoration: none;
        color: black;
        font-weight: bold;
      }

      .dropdown {
        display: inline-block;
        position: relative;
      }

      .dropbtn {
        background: none;
        border: none;
        font-weight: bold;
        margin: 15px;
        cursor: pointer;
        font-size: 16px;
      }

      .dropdown-content {
        display: none;
        position: absolute;
        background-color: white;
        min-width: 150px;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
        z-index: 10;
      }

      .dropdown-content a {
        color: black;
        text-decoration: none;
        display: block;
        padding: 8px 12px;
      }

      .dropdown-content a:hover {
        background-color: #f1f1f1;
      }

      .dropdown:hover .dropdown-content {
        display: block;
      }

      main {
        padding: 40px;
      }

      footer {
        background-color: #ddd;
        padding: 10px;
        margin-top: 40px;
      }

      /* Login Card */
      .login-card {
        background-color: white;
        max-width: 400px;
        margin: 0 auto;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        text-align: left;
      }

      .login-card img {
        display: block;
        width: 60%;
        margin: 0 auto 20px auto;
        opacity: 20%;
      }

      .login-card label {
        display: block;
        font-size: 14px;
        font-weight: bold;
        color: #333;
        margin-bottom: 5px;
      }

      .login-card input[type="text"],
      .login-card input[type="password"] {
        width: 100%;
        padding: 8px;
        margin-bottom: 15px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 5px;
        box-sizing: border-box;
      }

      .remember-me {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 15px;
        font-size: 14px;
        color: #333;
      }

      .login-card button {
        width: 100%;
        padding: 10px;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 15px;
      }

      .login-card button:hover {
        background-color: #45a049;
      }

      .forgot-password {
        display: block;
        text-align: center;
        margin-top: 15px;
        color: #4caf50;
        text-decoration: none;
        font-size: 14px;
      }

      .forgot-password:hover {
        text-decoration: underline;
      }

      .terms {
        margin-top: 15px;
        font-size: 12px;
        color: #888;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>OpenApron</h1>
    </header>

    <main>
      <h2>Login to OpenApron</h2>

      <div class="login-card">
        <form action="login.php" method="POST">
          <label for="username">Username:</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter Username"
          />

          <label for="password">Password:</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter Password"
            required
          />

          <div class="remember-me">
            <input type="checkbox" id="remember" />
            <label for="remember">Remember Me</label>
          </div>

          <button type="submit">Continue</button>

          <a href="forgot_password.html" class="forgot-password"
            >Forgot Password?</a
          >

          <a href="register.html" class="forgot-password"
            >Don't have an account? Register</a
          >

          <p class="terms">
            <small
              >By signing into OpenApron, you agree to our Terms of Service and
              Privacy Policy.</small
            >
          </p>
        </form>
      </div>
    </main>

    <footer>
      <p>© 2026 OpenApron</p>
    </footer>
  </body>
</html>
