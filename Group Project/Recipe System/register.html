<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - OpenApron</title>

    <style>
      body {
        font-family: Arial;
        margin: 0;
        background-color: #f4f4f4;
        text-align: center;
      }

      header {
        background-color: #4caf50;
        color: white;
        padding: 20px;
      }

      nav {
        background-color: #ffffff;
        padding: 10px;
      }

      nav a {
        margin: 15px;
        text-decoration: none;
        color: black;
        font-weight: bold;
      }

      .dropdown {
        display: inline-block;
        position: relative;
      }

      .dropbtn {
        background: none;
        border: none;
        font-weight: bold;
        margin: 15px;
        cursor: pointer;
        font-size: 16px;
      }

      .dropdown-content {
        display: none;
        position: absolute;
        background-color: white;
        min-width: 150px;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
        z-index: 10;
      }

      .dropdown-content a {
        color: black;
        text-decoration: none;
        display: block;
        padding: 8px 12px;
      }

      .dropdown-content a:hover {
        background-color: #f1f1f1;
      }

      .dropdown:hover .dropdown-content {
        display: block;
      }

      main {
        padding: 40px;
      }

      footer {
        background-color: #ddd;
        padding: 10px;
        margin-top: 40px;
      }

      /* Sign Up Card */
      .signup-card {
        background-color: white;
        max-width: 400px;
        margin: 0 auto;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        text-align: left;
      }

      .signup-card label {
        display: block;
        font-size: 14px;
        font-weight: bold;
        color: #333;
        margin-bottom: 5px;
      }

      .signup-card input {
        width: 100%;
        padding: 8px;
        margin-bottom: 15px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 5px;
        box-sizing: border-box;
      }

      .signup-card button {
        width: 100%;
        padding: 10px;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 15px;
      }

      .signup-card button:hover {
        background-color: #45a049;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>OpenApron</h1>
    </header>

    <nav>
      <div class="dropdown">
        <button class="dropbtn">Recipes</button>
        <div class="dropdown-content">
          <a href="myrecipes.html">My Recipes</a>
          <a href="sharerecipes.html">Share Recipes</a>
        </div>
      </div>

      <a href="messaging.html">Messaging</a>

      <div class="dropdown">
        <button class="dropbtn">Contact Us</button>
        <div class="dropdown-content">
          <a href="faq.html">FAQ</a>
          <a href="contactform.html">Contact Form</a>
          <a href="customersupport.html">Customer Support</a>
          <a href="feedback.html">Feedback</a>
        </div>
      </div>

      <a href="login.html">Sign Out</a>
    </nav>

    <main>
      <h2>Register for an Account</h2>

      <div class="signup-card">
        <form action="signup.php">
          <label for="email">Email:</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter Email"
          />

          <label for="username">Username:</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter Username"
            required
          />

          <label for="password">Password:</label>
          <input
            type="password"
            id="password"
            name="password"
            minlength="6"
            placeholder="Enter Password"
            required
          />

          <button type="submit">Sign Up</button>
        </form>
      </div>
    </main>

    <footer>
      <p>© 2026 OpenApron</p>
    </footer>
  </body>
</html>
