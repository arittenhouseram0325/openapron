<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Form - OpenApron</title>

    <style>
      body {
        font-family: Arial;
        margin: 0;
        background-color: #f4f4f4;
        text-align: center;
      }

      header {
        background-color: #4caf50;
        color: white;
        padding: 20px;
      }

      nav {
        background-color: #ffffff;
        padding: 10px;
      }

      nav a {
        margin: 15px;
        text-decoration: none;
        color: black;
        font-weight: bold;
      }

      .dropdown {
        display: inline-block;
        position: relative;
      }

      .dropbtn {
        background: none;
        border: none;
        font-weight: bold;
        margin: 15px;
        cursor: pointer;
        font-size: 16px;
      }

      .dropdown-content {
        display: none;
        position: absolute;
        background-color: white;
        min-width: 150px;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
        z-index: 10;
      }

      .dropdown-content a {
        color: black;
        text-decoration: none;
        display: block;
        padding: 8px 12px;
      }

      .dropdown-content a:hover {
        background-color: #f1f1f1;
      }

      .dropdown:hover .dropdown-content {
        display: block;
      }

      main {
        padding: 40px;
      }

      footer {
        background-color: #ddd;
        padding: 10px;
        margin-top: 40px;
      }

      /* Contact Info */
      .contact-info {
        font-size: 14px;
        color: #555;
        margin-bottom: 20px;
      }

      /* Form Card */
      .form-card {
        background-color: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        max-width: 500px;
        margin: 0 auto;
      }

      .form-card label {
        display: block;
        text-align: left;
        font-size: 14px;
        font-weight: bold;
        margin-bottom: 5px;
        color: #333;
      }

      .form-card input,
      .form-card textarea {
        width: 100%;
        padding: 8px;
        margin-bottom: 15px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 5px;
        box-sizing: border-box;
      }

      .form-card button {
        padding: 8px 16px;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
      }

      .form-card button:hover {
        background-color: #45a049;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>OpenApron</h1>
    </header>

    <nav>
      <a href="recipesystem.html">Home</a>
      <div class="dropdown">
        <button class="dropbtn">Recipes</button>
        <div class="dropdown-content">
          <a href="myrecipes.html">My Recipes</a>
        </div>
      </div>

      <a href="messaging.html">Messaging</a>

      <a href="login.html">Sign Out</a>
    </nav>

    <main>
      <h2>Contact Us</h2>

      <div class="contact-info">
        <p>
          Email us at: openapron@gmail.com &nbsp;|&nbsp; Based in: Watertown, NY
        </p>
      </div>

      <div class="form-card">
        <form action="/help">
          <label for="fullname">Full Name:</label>
          <input
            id="fullname"
            type="text"
            placeholder="Your full name"
            required
          />

          <label for="email">Email:</label>
          <input
            id="email"
            type="email"
            placeholder="Your email address"
            required
          />

          <label for="message">Message:</label>
          <textarea
            id="message"
            rows="5"
            placeholder="Write your message here..."
            required
          ></textarea>

          <button type="submit">Submit</button>
        </form>
      </div>
    </main>

    <footer>
      <p>© 2026 OpenApron</p>
    </footer>
  </body>
</html>
