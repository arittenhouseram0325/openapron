<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Recipe - OpenApron</title>

    <style>
      body {
        font-family: Arial;
        margin: 0;
        background-color: #f4f4f4;
        text-align: center;
      }

      header {
        background-color: #4caf50;
        color: white;
        padding: 20px;
      }

      nav {
        background-color: #ffffff;
        padding: 10px;
      }

      nav a {
        margin: 15px;
        text-decoration: none;
        color: black;
        font-weight: bold;
      }

      .dropdown {
        display: inline-block;
        position: relative;
      }

      .dropbtn {
        background: none;
        border: none;
        font-weight: bold;
        margin: 15px;
        cursor: pointer;
        font-size: 16px;
      }

      .dropdown-content {
        display: none;
        position: absolute;
        background-color: white;
        min-width: 150px;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
        z-index: 10;
      }

      .dropdown-content a {
        color: black;
        text-decoration: none;
        display: block;
        padding: 8px 12px;
      }

      .dropdown-content a:hover {
        background-color: #f1f1f1;
      }

      .dropdown:hover .dropdown-content {
        display: block;
      }

      main {
        padding: 40px;
      }

      footer {
        background-color: #ddd;
        padding: 10px;
        margin-top: 40px;
      }

      /* Form Card */
      .form-card {
        background-color: white;
        max-width: 700px;
        margin: 0 auto;
        border-radius: 8px;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        text-align: left;
        padding: 32px 28px;
      }

      .form-card h1 {
        font-size: 24px;
        color: #333;
        margin-bottom: 28px;
        text-align: center;
      }

      .form-section {
        margin-bottom: 24px;
      }

      .form-section h2 {
        font-size: 16px;
        color: #4caf50;
        font-weight: bold;
        margin-bottom: 10px;
        padding-bottom: 6px;
        border-bottom: 1px solid #e0e0e0;
      }

      .form-section label {
        display: block;
        font-size: 14px;
        color: #555;
        margin-bottom: 5px;
        font-weight: bold;
      }

      .form-section input[type="text"],
      .form-section input[type="number"],
      .form-section textarea,
      .form-section select {
        width: 100%;
        padding: 9px 11px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 14px;
        color: #333;
        box-sizing: border-box;
        margin-bottom: 14px;
        font-family: Arial;
      }

      .form-section input[type="text"]:focus,
      .form-section input[type="number"]:focus,
      .form-section textarea:focus,
      .form-section select:focus {
        outline: none;
        border-color: #4caf50;
        box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.15);
      }

      .form-section textarea {
        resize: vertical;
        min-height: 120px;
      }

      /* Image upload */
      .upload-area {
        border: 2px dashed #ccc;
        border-radius: 6px;
        padding: 24px;
        text-align: center;
        color: #aaa;
        font-size: 14px;
        cursor: pointer;
        margin-bottom: 14px;
        transition: border-color 0.2s;
      }

      .upload-area:hover {
        border-color: #4caf50;
        color: #4caf50;
      }

      .upload-area input[type="file"] {
        display: none;
      }

      /* Nutrition row */
      .nutrition-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0 16px;
      }

      /* Action buttons */
      .form-actions {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 10px;
      }

      .form-actions button {
        padding: 10px 28px;
        border: none;
        border-radius: 5px;
        font-size: 14px;
        cursor: pointer;
        font-weight: bold;
      }

      .btn-submit {
        background-color: #4caf50;
        color: white;
      }

      .btn-submit:hover {
        background-color: #45a049;
      }

      .btn-cancel {
        background-color: white;
        color: #e53935;
        border: 2px solid #e53935 !important;
      }

      .btn-cancel:hover {
        background-color: #fff5f5;
      }

      /* Success message */
      .success-msg {
        display: none;
        background-color: #e8f5e9;
        border: 1px solid #4caf50;
        color: #2e7d32;
        padding: 12px 16px;
        border-radius: 6px;
        font-size: 14px;
        margin-bottom: 20px;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>OpenApron</h1>
    </header>

    <nav>
      <a href="recipesystem.html">Home</a>
      <div class="dropdown">
        <button class="dropbtn">Recipes</button>
        <div class="dropdown-content">
          <a href="myrecipes.html">My Recipes</a>
        </div>
      </div>
      <a href="messaging.html">Messaging</a>
      <div class="dropdown">
        <button class="dropbtn">Contact Us</button>
        <div class="dropdown-content">
          <a href="faq.html">FAQ</a>
          <a href="contactform.html">Contact Form</a>
          <a href="customersupport.html">Customer Support</a>
          <a href="feedback.html">Feedback</a>
        </div>
      </div>
      <a href="login.html">Sign Out</a>
    </nav>
    <main>
      <form
        class="form-card"
        action="addRecipe.php"
        method="POST"
        enctype="multipart/form-data"
      >
        <h1>Add a New Recipe</h1>

        <div class="success-msg" id="successMsg">
          ✅ Your recipe has been added successfully!
        </div>

        <!-- Basic Info -->
        <div class="form-section">
          <h2>Basic Information</h2>

          <label for="recipeName">Recipe Name</label>
          <input
            type="text"
            id="recipeName"
            name="recipeName"
            placeholder="e.g. Chicken Alfredo"
          />

          <label for="recipeCategory">Category</label>
          <select id="recipeCategory" name="recipeCategory">
            <option value="">-- Select a category --</option>
            <option value="breakfast">Breakfast</option>
            <option value="lunch">Lunch</option>
            <option value="dinner">Dinner</option>
            <option value="dessert">Dessert</option>
            <option value="snack">Snack</option>
            <option value="salad">Salad</option>
            <option value="soup">Soup</option>
            <option value="other">Other</option>
          </select>

          <label for="recipeServings">Servings</label>
          <input
            type="number"
            id="recipeServings"
            name="recipeServings"
            placeholder="e.g. 4"
            min="1"
          />

          <label for="recipeDescription">Short Description (optional)</label>
          <textarea
            id="recipeDescription"
            name="recipeDescription"
            placeholder="A brief description of your recipe..."
          ></textarea>
        </div>

        <!-- Photo -->
        <div class="form-section">
          <h2>Recipe Photo</h2>
          <div
            class="upload-area"
            onclick="document.getElementById('photoUpload').click()"
          >
            <input
              type="file"
              id="photoUpload"
              name="photoUpload"
              accept="image/*"
              onchange="showFileName(this)"
            />
            <p id="uploadLabel">📷 Click to upload a photo</p>
          </div>
        </div>

        <!-- Ingredients -->
        <div class="form-section">
          <h2>Ingredients</h2>
          <label for="recipeIngredients"
            >List each ingredient on a new line</label
          >
          <textarea
            id="recipeIngredients"
            name="recipeIngredients"
            placeholder="e.g.&#10;2 cups flour&#10;1 cup milk&#10;2 eggs"
          ></textarea>
        </div>

        <!-- Instructions -->
        <div class="form-section">
          <h2>Instructions</h2>
          <label for="recipeInstructions">List each step on a new line</label>
          <textarea
            id="recipeInstructions"
            name="recipeInstructions"
            placeholder="e.g.&#10;Preheat oven to 350°F.&#10;Mix dry ingredients together.&#10;Add wet ingredients and stir."
          ></textarea>
        </div>

        <!-- Nutrition -->
        <div class="form-section">
          <h2>
            Nutrition Information
            <span style="font-weight: normal; color: #aaa">(per serving)</span>
          </h2>
          <div class="nutrition-grid">
            <div>
              <label for="calories">Calories</label>
              <input
                type="number"
                id="calories"
                name="calories"
                placeholder="e.g. 450"
                min="0"
              />
            </div>
            <div>
              <label for="protein">Protein (g)</label>
              <input
                type="number"
                id="protein"
                name="protein"
                placeholder="e.g. 30"
                min="0"
              />
            </div>
            <div>
              <label for="carbs">Carbohydrates (g)</label>
              <input
                type="number"
                id="carbs"
                name="carbs"
                placeholder="e.g. 40"
                min="0"
              />
            </div>
            <div>
              <label for="fat">Fat (g)</label>
              <input
                type="number"
                id="fat"
                name="fat"
                placeholder="e.g. 20"
                min="0"
              />
            </div>
          </div>
        </div>

        <!-- Buttons -->
        <div class="form-actions">
          <button type="submit" class="btn-submit">Add Recipe</button>
          <button
            type="button"
            class="btn-cancel"
            onclick="window.location.href = 'myrecipes.html'"
          >
            Cancel
          </button>
        </div>
      </form>
    </main>

    <footer>
      <p>© 2026 OpenApron</p>
    </footer>

    <script>
      function showFileName(input) {
        const label = document.getElementById("uploadLabel");
        if (input.files && input.files[0]) {
          label.textContent = "📷 " + input.files[0].name;
        }
      }

      function submitRecipe() {
        const name = document.getElementById("recipeName").value.trim();
        const ingredients = document
          .getElementById("recipeIngredients")
          .value.trim();
        const instructions = document
          .getElementById("recipeInstructions")
          .value.trim();

        if (!name) {
          alert("Please enter a recipe name.");
          return;
        }
        if (!ingredients) {
          alert("Please enter at least one ingredient.");
          return;
        }
        if (!instructions) {
          alert("Please enter at least one instruction step.");
          return;
        }

        const successMsg = document.getElementById("successMsg");
        successMsg.style.display = "block";
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    </script>
  </body>
</html>
