<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Recipe - Fresh Garden Salad | OpenApron</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Merriweather:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      :before,
      :after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Lato", Arial, sans-serif;
        background-color: #f4f4f4;
        text-align: center;
        color: #333;
      }
      header {
        background-color: #4caf50;
        color: white;
        padding: 20px;
      }
      header h1 {
        font-family: "Merriweather", serif;
        font-size: 28px;
      }
      nav {
        background-color: #ffffff;
        padding: 10px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      }
      nav a {
        margin: 15px;
        text-decoration: none;
        color: black;
        font-weight: bold;
        font-size: 15px;
      }
      nav a:hover {
        color: #4caf50;
      }
      .dropdown {
        display: inline-block;
        position: relative;
      }
      .dropbtn {
        background: none;
        border: none;
        font-weight: bold;
        margin: 15px;
        cursor: pointer;
        font-size: 15px;
        font-family: "Lato", Arial, sans-serif;
      }
      .dropdown-content {
        display: none;
        position: absolute;
        background-color: white;
        min-width: 150px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        z-index: 10;
        border-radius: 4px;
      }
      .dropdown-content a {
        color: black;
        text-decoration: none;
        display: block;
        padding: 8px 12px;
        text-align: left;
        font-size: 14px;
      }
      .dropdown-content a:hover {
        background-color: #f1f1f1;
      }
      .dropdown:hover .dropdown-content {
        display: block;
      }
      main {
        padding: 40px 20px;
      }
      .edit-card {
        background-color: white;
        max-width: 700px;
        margin: 0 auto;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        text-align: left;
      }
      .image-section {
        position: relative;
      }
      .image-section img {
        width: 100%;
        height: 280px;
        object-fit: cover;
        display: block;
      }
      .image-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.5));
        padding: 20px 16px 10px;
      }
      .btn-change-image {
        background: rgba(255, 255, 255, 0.9);
        border: none;
        border-radius: 5px;
        padding: 6px 14px;
        font-size: 12px;
        font-weight: bold;
        color: #333;
        cursor: pointer;
      }
      .btn-change-image:hover {
        background: white;
      }
      figcaption {
        font-size: 12px;
        color: #888;
        text-align: center;
        padding: 6px 0;
        border-bottom: 1px solid #f0f0f0;
      }
      .edit-body {
        padding: 24px 28px;
      }
      .edit-body h1 {
        font-family: "Merriweather", serif;
        font-size: 22px;
        color: #333;
        margin-bottom: 20px;
        text-align: center;
      }
      .edit-section {
        margin-bottom: 28px;
      }
      .edit-section h2 {
        font-size: 15px;
        color: #4caf50;
        font-weight: bold;
        margin-bottom: 12px;
        padding-bottom: 6px;
        border-bottom: 1px solid #e0e0e0;
      }
      .field-group {
        margin-bottom: 14px;
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: bold;
        color: #777;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 5px;
      }
      input[type="text"],
      input[type="number"],
      textarea {
        width: 100%;
        padding: 9px 12px;
        border: 1.5px solid #ddd;
        border-radius: 5px;
        font-size: 14px;
        font-family: "Lato", Arial, sans-serif;
        color: #333;
        background: #fafafa;
      }
      .ingredient-list,
      .instruction-list {
        list-style: none;
        padding: 0;
      }
      .ingredient-item,
      .instruction-item {
        display: flex;
        gap: 8px;
        align-items: flex-start;
        margin-bottom: 8px;
      }
      .ingredient-item input,
      .instruction-item textarea {
        flex: 1;
      }
      .step-num {
        background-color: #4caf50;
        color: white;
        font-size: 11px;
        font-weight: bold;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        margin-top: 9px;
      }
      .nutrition-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .btn-add {
        background: none;
        border: 1.5px dashed #4caf50;
        color: #4caf50;
        border-radius: 5px;
        padding: 6px 14px;
        font-size: 13px;
        font-weight: bold;
        width: 100%;
      }
      .edit-actions {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 10px;
        padding-top: 20px;
        border-top: 1px solid #eee;
      }
      .edit-actions button {
        padding: 10px 24px;
        border: none;
        border-radius: 5px;
        font-size: 14px;
        font-weight: bold;
      }
      .btn-save {
        background-color: #4caf50;
        color: white;
      }
      .btn-cancel {
        background-color: white;
        color: #888;
        border: 2px solid #ddd;
      }
      .toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: #333;
        color: white;
        padding: 12px 24px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: bold;
      }
      .show {
      }
      footer {
        background-color: #ddd;
        padding: 10px;
        margin-top: 40px;
        font-size: 13px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <header><h1>OpenApron</h1></header>
    <nav>
      <a href="recipesystem.html">Home</a>
      <div class="dropdown">
        <button class="dropbtn">Recipes</button>
        <div class="dropdown-content">
          <a href="myrecipes.html">My Recipes</a>
        </div>
      </div>
      <a href="messaging.html">Messaging</a>
      <div class="dropdown">
        <button class="dropbtn">Contact Us</button>
        <div class="dropdown-content">
          <a href="faq.html">FAQ</a><a href="contactform.html">Contact Form</a
          ><a href="customersupport.html">Customer Support</a
          ><a href="feedback.html">Feedback</a>
        </div>
      </div>
      <a href="login.html">Sign Out</a>
    </nav>
    <main>
      <div class="edit-card">
        <div class="image-section">
          <figure>
            <img id="recipeImage" src="salad.jpg" alt="Fresh Garden Salad" />
            <div class="image-overlay">
              <button class="btn-change-image">📷 Change Photo</button>
            </div>
          </figure>
          <figcaption>Crisp and Colorful Fresh Garden Salad</figcaption>
        </div>
        <div class="edit-body">
          <h1>Edit Recipe</h1>
          <div class="edit-section">
            <h2>📋 Recipe Name</h2>
            <div class="field-group">
              <label for="recipeTitle">Title</label
              ><input type="text" id="recipeTitle" value="Fresh Garden Salad" />
            </div>
          </div>
          <div class="edit-section">
            <h2>🥗 Ingredients</h2>
            <ul class="ingredient-list">
              <li class="ingredient-item">
                <input type="text" value="4 cups romaine lettuce, chopped" />
              </li>
              <li class="ingredient-item">
                <input type="text" value="1 cup cherry tomatoes, halved" />
              </li>
              <li class="ingredient-item">
                <input type="text" value="1 cucumber, sliced" />
              </li>
              <li class="ingredient-item">
                <input type="text" value="1/2 red onion, thinly sliced" />
              </li>
              <li class="ingredient-item">
                <input type="text" value="1 cup shredded carrots" />
              </li>
              <li class="ingredient-item">
                <input type="text" value="1/2 cup radishes, sliced" />
              </li>
            </ul>
            <button class="btn-add">+ Add Ingredient</button>
          </div>
          <div class="edit-section">
            <h2>📝 Instructions</h2>
            <ol class="instruction-list">
              <li class="instruction-item">
                <span class="step-num">1</span
                ><textarea>Wash and thoroughly dry all vegetables.</textarea>
              </li>
              <li class="instruction-item">
                <span class="step-num">2</span
                ><textarea>Chop lettuce and add to bowl.</textarea>
              </li>
              <li class="instruction-item">
                <span class="step-num">3</span
                ><textarea>Add remaining vegetables.</textarea>
              </li>
              <li class="instruction-item">
                <span class="step-num">4</span
                ><textarea>Whisk dressing ingredients together.</textarea>
              </li>
              <li class="instruction-item">
                <span class="step-num">5</span
                ><textarea>Toss salad with dressing and serve.</textarea>
              </li>
            </ol>
            <button class="btn-add">+ Add Step</button>
          </div>
          <div class="edit-section">
            <h2>🥦 Nutrition Information</h2>
            <p style="font-size: 13px; color: #888; margin-bottom: 12px">
              Per serving (based on 4 servings)
            </p>
            <div class="nutrition-grid">
              <input type="number" value="140" /><input
                type="number"
                value="4"
              /><input type="number" value="12" /><input
                type="number"
                value="9"
              />
            </div>
          </div>
          <div class="edit-actions">
            <button class="btn-cancel">Cancel</button
            ><button class="btn-save">💾 Save Changes</button>
          </div>
        </div>
      </div>
    </main>
    <footer><p>© 2026 OpenApron</p></footer>
  </body>
</html>
