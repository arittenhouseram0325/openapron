<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Recipes - OpenApron</title>

    <style>
      body {
        font-family: Arial;
        margin: 0;
        background-color: #f4f4f4;
        text-align: center;
      }

      header {
        background-color: #4caf50;
        color: white;
        padding: 20px;
      }

      nav {
        background-color: #ffffff;
        padding: 10px;
      }

      nav a {
        margin: 15px;
        text-decoration: none;
        color: black;
        font-weight: bold;
      }

      main {
        padding: 40px;
      }

      footer {
        background-color: #ddd;
        padding: 10px;
        margin-top: 40px;
      }

      .controls {
        margin-bottom: 30px;
      }

      .controls input,
      .controls select,
      .controls button {
        padding: 8px;
        margin: 5px;
        font-size: 14px;
      }

      .controls button {
        background-color: #4caf50;
        color: white;
        border: none;
        cursor: pointer;
      }

      .controls button:hover {
        background-color: #45a049;
      }

      .recipe-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        max-width: 1000px;
        margin: 0 auto;
      }

      .recipe-card {
        background-color: white;
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
      }

      .recipe-card img {
        width: 100%;
        border-radius: 5px;
        object-fit: cover;
        height: 200px;
      }

      .recipe-card h3 {
        margin: 10px 0 5px;
      }

      .recipe-card p {
        font-size: 14px;
        color: #555;
      }

      /* Single rule for all action buttons and links */
      .recipe-card .btn {
        display: inline-block;
        margin: 5px;
        padding: 6px 10px;
        border: none;
        background-color: #4caf50;
        color: white;
        cursor: pointer;
        font-size: 13px;
        text-decoration: none;
        border-radius: 4px;
      }

      .recipe-card .btn:hover {
        background-color: #45a049;
      }

      .dropdown {
        display: inline-block;
        position: relative;
      }

      .dropbtn {
        background: none;
        border: none;
        font-weight: bold;
        margin: 15px;
        cursor: pointer;
        font-size: 16px;
      }

      .dropdown-content {
        display: none;
        position: absolute;
        background-color: white;
        min-width: 150px;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
        z-index: 10;
      }

      .dropdown-content a {
        color: black;
        text-decoration: none;
        display: block;
        padding: 8px 12px;
      }

      .dropdown-content a:hover {
        background-color: #f1f1f1;
      }

      .dropdown:hover .dropdown-content {
        display: block;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>OpenApron</h1>
    </header>

    <nav>
      <a href="recipesystem.html">Home</a>
      <a href="messaging.html">Messaging</a>

      <div class="dropdown">
        <button class="dropbtn">Contact Us</button>
        <div class="dropdown-content">
          <a href="faq.html">FAQ</a>
          <a href="contactform.html">Contact Form</a>
          <a href="customersupport.html">Customer Support</a>
          <a href="feedback.html">Feedback</a>
        </div>
      </div>

      <a href="login.html">Sign Out</a>
    </nav>

    <main>
      <h2>My Recipes</h2>

      <section class="controls">
        <input type="text" placeholder="Search recipes..." />
        <button>Add New Recipe</button>
        <select>
          <option>All Recipes</option>
          <option>Favorites</option>
          <option>Shared With Me</option>
        </select>
      </section>

      <section class="recipe-grid">
        <div class="recipe-card">
          <img src="pasta.jpg" alt="Pasta Recipe" />
          <h3>Creamy Alfredo Pasta</h3>
          <p>Quick 20-minute dinner recipe.</p>
          <a href="chickenalfredo.html" class="btn">View</a>
          <a href="edit_pasta.html" class="btn">Edit</a>
          <button class="btn">Share</button>
        </div>

        <div class="recipe-card">
          <img src="pancakes.jpg" alt="Pancakes" />
          <h3>Fluffy Pancakes</h3>
          <p>Perfect breakfast favorite.</p>
          <a href="pancakes.html" class="btn">View</a>
          <a href="edit_pancakes.html" class="btn">Edit</a>
          <button class="btn">Share</button>
        </div>

        <div class="recipe-card">
          <img src="salad.jpg" alt="Salad" />
          <h3>Fresh Garden Salad</h3>
          <p>Healthy and refreshing.</p>
          <a href="salad.html" class="btn">View</a>
          <a href="edit_salad.html" class="btn">Edit</a>
          <button class="btn">Share</button>
        </div>
      </section>
    </main>

    <footer>
      <p>© 2026 OpenApron</p>
    </footer>
  </body>
</html>
